name: main-guard-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  tests-matrix:
    name: ci-pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-ci.lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.lock.txt

      - name: Run full pytest suite
        run: |
          pytest -q

  tests:
    name: ci-pytest
    runs-on: ubuntu-latest
    needs: tests-matrix

    steps:
      - name: Confirm matrix gate
        run: |
          echo "ci-pytest matrix passed for Python 3.11, 3.12, and 3.13"

  static-validation:
    name: ci-static-validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.lock.txt

      - name: Validate Python syntax
        run: |
          python -m compileall -q src tests

      - name: Validate dependency graph
        run: |
          python -m pip check
