name: main-guard-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  tests:
    name: ci-pytest
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements-ci.lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check "pip==26.0.1"
          python -m pip install --require-hashes -r requirements-ci.lock.txt

      - name: Run full pytest suite
        run: |
          pytest -q

  static-validation:
    name: ci-static-validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements-ci.lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check "pip==26.0.1"
          python -m pip install --require-hashes -r requirements-ci.lock.txt

      - name: Validate Python syntax
        run: |
          python -m compileall -q src tests

      - name: Validate dependency graph
        run: |
          python -m pip check
